<nav class="border-b border-white/10 bg-black/80 text-white px-8 py-4 flex justify-between items-center">
  <a routerLink="/items" class="text-2xl tracking-[0.3em] font-bold">
    REPAIRDESK
  </a>

  <div class="flex gap-6 items-center text-sm tracking-widest">
    <a routerLink="/items">ITEMS</a>
    <a routerLink="/items/create">+ CREATE</a>
    <a routerLink="/dashboard">DASHBOARD</a>

    @if (authService.isLoggedIn()) {
      <span class="text-lime-300">
        {{ authService.getFullName() }} | {{ authService.getRole() }}
      </span>

      <button
        (click)="logout()"
        class="border border-white/20 px-3 py-1 rounded hover:bg-white/10"
      >
        LOGOUT
      </button>
    } @else {
      <a routerLink="/login">LOGIN</a>
      <a routerLink="/register">REGISTER</a>
    }
  </div>
</nav>

<div class="p-8">
  <router-outlet></router-outlet>
</div>
