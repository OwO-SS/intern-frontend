<div class="animate-slide-up">
  <div class="flex items-end justify-between mb-10">
    <div>
      <span class="font-['DM_Mono',monospace] text-[0.7rem] tracking-[0.15em] uppercase text-[#e8ff47] block mb-[0.4rem]">Overview</span>
      <h1 class="font-['Bebas_Neue',sans-serif] text-5xl tracking-[0.08em] leading-none m-0 text-[#f0f0f5]">DASHBOARD</h1>
    </div>
    <div class="flex items-center gap-2 font-['DM_Mono',monospace] text-[0.72rem] text-[#6b6b80] tracking-[0.08em] pb-2">
      <span class="w-[6px] h-[6px] rounded-full bg-[#22d68a] shadow-[0_0_6px_#22d68a] animate-pulse-dot"></span> Live
    </div>
  </div>

  <div class="grid grid-cols-4 gap-4 max-md:grid-cols-2">

    <div class="bg-[#141417] border border-[#2a2a32] border-l-[3px] border-l-[#9090a8] rounded-[6px] p-7 relative overflow-hidden transition-all duration-200 hover:-translate-y-[2px]">
      <div class="font-['DM_Mono',monospace] text-[0.68rem] tracking-[0.12em] uppercase text-[#6b6b80] mb-3">Total Requests</div>
      <div class="font-['Bebas_Neue',sans-serif] text-[3.5rem] leading-none tracking-[0.05em] text-[#f0f0f5]">{{ summary.total }}</div>
    </div>

    <div class="bg-[#141417] border border-[#2a2a32] border-l-[3px] border-l-[#ffb020] rounded-[6px] p-7 relative overflow-hidden transition-all duration-200 hover:-translate-y-[2px] hover:border-[#ffb020]">
      <div class="font-['DM_Mono',monospace] text-[0.68rem] tracking-[0.12em] uppercase text-[#6b6b80] mb-3">Pending</div>
      <div class="font-['Bebas_Neue',sans-serif] text-[3.5rem] leading-none tracking-[0.05em] text-[#ffb020]">{{ summary.pending }}</div>
      <div class="absolute bottom-5 right-6 text-2xl opacity-20">⏳</div>
    </div>

    <div class="bg-[#141417] border border-[#2a2a32] border-l-[3px] border-l-[#22d68a] rounded-[6px] p-7 relative overflow-hidden transition-all duration-200 hover:-translate-y-[2px] hover:border-[#22d68a]">
      <div class="font-['DM_Mono',monospace] text-[0.68rem] tracking-[0.12em] uppercase text-[#6b6b80] mb-3">Completed</div>
      <div class="font-['Bebas_Neue',sans-serif] text-[3.5rem] leading-none tracking-[0.05em] text-[#22d68a]">{{ summary.completed }}</div>
      <div class="absolute bottom-5 right-6 text-2xl opacity-20">✓</div>
    </div>

    <div class="bg-[#141417] border border-[#2a2a32] border-l-[3px] border-l-[#ff4545] rounded-[6px] p-7 relative overflow-hidden transition-all duration-200 hover:-translate-y-[2px] hover:border-[#ff4545]">
      <div class="font-['DM_Mono',monospace] text-[0.68rem] tracking-[0.12em] uppercase text-[#6b6b80] mb-3">High Priority</div>
      <div class="font-['Bebas_Neue',sans-serif] text-[3.5rem] leading-none tracking-[0.05em] text-[#ff4545]">{{ summary.highPriority }}</div>
      <div class="absolute bottom-5 right-6 text-2xl opacity-20">!</div>
    </div>

  </div>
</div>
