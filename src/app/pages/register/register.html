<div class="animate-slide-up min-h-[calc(100vh-56px-5rem)] flex items-stretch gap-0">

  <div class="bg-[#141417] border border-[#2a2a32] rounded-[6px] p-10 w-[420px] shrink-0 flex flex-col">
    <div class="mb-8">
      <span class="font-['DM_Mono',monospace] text-[0.7rem] tracking-[0.15em] uppercase text-[#e8ff47] block mb-2">Get started</span>
      <h1 class="font-['Bebas_Neue',sans-serif] text-[3.5rem] tracking-[0.08em] leading-none text-[#f0f0f5] m-0 mb-4">CREATE<br>ACCOUNT</h1>
      <div class="h-[2px] w-12 bg-[#e8ff47]"></div>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col">
        <label class="font-['DM_Mono',monospace] text-[0.7rem] tracking-[0.12em] uppercase text-[#6b6b80] block mb-[0.4rem]">Full Name</label>
        <input formControlName="fullName" placeholder="John Doe"
               class="font-['DM_Mono',monospace] text-[0.875rem] bg-[#1c1c21] border border-[#2a2a32] text-[#f0f0f5] rounded-[4px] px-[0.875rem] py-[0.65rem] w-full outline-none transition-all duration-150 placeholder:text-[#6b6b80] focus:border-[#e8ff47] focus:shadow-[0_0_0_2px_rgba(232,255,71,0.1)]" />
      </div>

      <div class="flex flex-col">
        <label class="font-['DM_Mono',monospace] text-[0.7rem] tracking-[0.12em] uppercase text-[#6b6b80] block mb-[0.4rem]">Email Address</label>
        <input type="email" formControlName="email" placeholder="you@example.com"
               class="font-['DM_Mono',monospace] text-[0.875rem] bg-[#1c1c21] border border-[#2a2a32] text-[#f0f0f5] rounded-[4px] px-[0.875rem] py-[0.65rem] w-full outline-none transition-all duration-150 placeholder:text-[#6b6b80] focus:border-[#e8ff47] focus:shadow-[0_0_0_2px_rgba(232,255,71,0.1)]" />
      </div>

      <div class="flex flex-col">
        <label class="font-['DM_Mono',monospace] text-[0.7rem] tracking-[0.12em] uppercase text-[#6b6b80] block mb-[0.4rem]">Password</label>
        <input type="password" formControlName="password" placeholder="••••••••"
               class="font-['DM_Mono',monospace] text-[0.875rem] bg-[#1c1c21] border border-[#2a2a32] text-[#f0f0f5] rounded-[4px] px-[0.875rem] py-[0.65rem] w-full outline-none transition-all duration-150 placeholder:text-[#6b6b80] focus:border-[#e8ff47] focus:shadow-[0_0_0_2px_rgba(232,255,71,0.1)]" />
      </div>

      <button type="submit"
              class="mt-2 bg-[#e8ff47] text-[#0c0c0e] border-none rounded-[4px] px-6 py-[0.8rem] font-['DM_Mono',monospace] text-[0.8rem] font-medium tracking-[0.12em] uppercase cursor-pointer flex items-center justify-between transition-all duration-150 hover:bg-[#b8cc2a] active:scale-[0.99]">
        <span>Create Account</span>
        <span class="text-base">→</span>
      </button>
    </form>

    <p class="mt-6 font-['DM_Mono',monospace] text-[0.78rem] text-[#6b6b80] pt-6 border-t border-[#2a2a32]">
      Already have an account?
      <a routerLink="/login" class="text-[#e8ff47] no-underline ml-1 hover:underline">Sign in</a>
    </p>
  </div>

  <div class="flex-1 flex items-center justify-center pl-12">
    <div class="font-['Bebas_Neue',sans-serif] text-[clamp(4rem,10vw,9rem)] leading-[0.9] tracking-[0.05em] text-[#1c1c21] select-none">REPAIR<br>DESK</div>
  </div>
</div>
