<div class="max-w-md mx-auto bg-white shadow rounded-lg p-6">
  <h1 class="text-3xl font-bold mb-6">Login</h1>

  <p *ngIf="errorMessage" class="text-red-500 mb-3">
    {{ errorMessage }}
  </p>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block font-medium mb-1">Email</label>
      <input type="email" formControlName="email" class="w-full border rounded px-3 py-2" />
    </div>

    <div>
      <label class="block font-medium mb-1">Password</label>
      <input type="password" formControlName="password" class="w-full border rounded px-3 py-2" />
    </div>

    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
      Login
    </button>
  </form>

  <p class="mt-4">
    Don't have an account?
    <a routerLink="/register" class="text-blue-600">Register</a>
  </p>
</div>
